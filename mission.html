<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoV Ultra Planner - mission.html</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Chakra Petch', sans-serif; background-color: #000; color: #fff; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 24px; }
        .mission-item { background: #111; border: 1px solid #222; transition: 0.2s; padding: 10px 14px; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .mission-item.active { border-color: #FE2C55; background: rgba(254, 44, 85, 0.1); }
        .clip-btn { transition: all 0.2s; border: 1px solid #222; position: relative; }
        .clip-btn.selected { background: #FE2C55 !important; border-color: #FE2C55; color: white; box-shadow: 0 0 15px rgba(254, 44, 85, 0.4); }
        .nav-active { color: #FE2C55 !important; border-top: 2px solid #FE2C55; }
        .quick-tag { background: #1a1a1a; border: 1px solid #333; color: #888; transition: 0.15s; cursor: pointer; flex: 1 1 calc(20% - 8px); min-width: 60px; text-align: center; }
        .quick-tag:active { background: #FE2C55; color: white; border-color: #FE2C55; transform: scale(0.95); }
        .vip-badge { position: absolute; top: -5px; right: -5px; background: #FFD700; color: #000; font-size: 8px; padding: 1px 4px; border-radius: 5px; font-weight: bold; }
        nav { background: rgba(10, 10, 10, 0.98); border-top: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="p-4 flex flex-col items-center min-h-screen pb-32">

    <div class="w-full max-w-md space-y-4">
        <header class="text-center py-4 border-b border-gray-900">
            <h1 class="text-2xl font-bold tracking-tighter uppercase italic">RoV <span class="text-[#FE2C55]">ULTRA</span> AI</h1>
            <p class="text-[10px] text-zinc-500 uppercase tracking-widest mt-1">Smart Persistence System 2026</p>
        </header>

        <div class="glass-card p-5 border-[#FE2C55]/20 border text-center">
            <h3 class="text-[10px] text-gray-500 uppercase font-bold mb-3 tracking-widest">ระบุเป้าหมายคูปอง</h3>
            <div class="space-y-3 mb-4">
                <input type="number" id="customInput" placeholder="จำนวนคูปอง" class="w-full bg-black border border-gray-800 p-4 rounded-2xl text-2xl font-bold text-center text-white outline-none focus:border-[#FE2C55]">
                <button onclick="runUltraAI()" class="w-full bg-[#FE2C55] text-white py-4 rounded-2xl font-bold text-lg active:scale-95 shadow-lg shadow-[#FE2C55]/20">คำนวณคูปอง</button>
            </div>
            <div class="flex flex-wrap justify-center gap-2 mb-4">
                <button onclick="setGoal(100)" class="quick-tag py-2 rounded-xl text-[10px] font-bold">100</button>
                <button onclick="setGoal(300)" class="quick-tag py-2 rounded-xl text-[10px] font-bold">300</button>
                <button onclick="setGoal(500)" class="quick-tag py-2 rounded-xl text-[10px] font-bold">500</button>
                <button onclick="setGoal(800)" class="quick-tag py-2 rounded-xl text-[10px] font-bold">800</button>
                <button onclick="setGoal(1000)" class="quick-tag py-2 rounded-xl text-[10px] font-bold">1000</button>
                <button onclick="setGoal(1100)" class="quick-tag py-2 rounded-xl text-[10px] font-bold">1100</button>
                <button onclick="setGoal(1200)" class="quick-tag py-2 rounded-xl text-[10px] font-bold">1200</button>
                <button onclick="setGoal(1300)" class="quick-tag py-2 rounded-xl text-[10px] font-bold">1300</button>
                <button onclick="setGoal(1400)" class="quick-tag py-2 rounded-xl text-[10px] font-bold">1400</button>
            </div>
            <button onclick="fullReset()" class="w-full p-2 rounded-xl text-[9px] text-gray-600 font-bold uppercase tracking-widest hover:text-white transition-colors">ล้างข้อมูลทั้งหมด</button>
        </div>

        <div class="glass-card p-6 sticky top-2 z-30 border-[#FE2C55]/30 border shadow-[0_0_30px_rgba(254,44,85,0.2)] text-center">
            <p class="text-[10px] text-gray-400 uppercase tracking-widest font-bold">แต้มสะสมทั้งหมด</p>
            <h2 id="totalPts" class="text-6xl font-bold text-white tracking-tighter">0</h2>
            <div id="aiAdvice" class="mt-4 p-3 rounded-xl bg-white/5 text-[#25F4EE] text-[11px] font-bold italic">
                <span>ระบุเป้าหมายเพื่อเริ่มวางแผน</span>
            </div>
            <div id="exchangeSummary" class="mt-4 pt-4 border-t border-gray-800 text-left space-y-3 hidden">
                <div id="exchangeList" class="text-sm text-white font-bold mb-1"></div>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="copyBaseOnly()" id="btnBase" class="bg-sky-500/20 py-3 rounded-xl border border-sky-500/30 text-sky-400 text-[10px] font-bold transition-all">คัดลอกแผนงาน</button>
                    <button onclick="copyUpdateOnly()" id="btnUpdate" class="bg-[#FE2C55]/20 py-3 rounded-xl border border-[#FE2C55]/30 text-[#FE2C55] text-[10px] font-bold transition-all">รางวัลรอรับ</button>
                </div>
                <div class="flex justify-between items-center bg-black/50 p-3 rounded-xl mt-2 text-[10px]">
                    <div>ต้องใช้: <span id="usedPts" class="text-sky-400 font-bold">0</span></div>
                    <div id="remainLabel">ขาด/เหลือ: <span id="remainPts" class="font-bold">0</span></div>
                </div>
            </div>
        </div>

        <div class="glass-card p-5">
            <div class="flex justify-between items-center mb-3 text-xs font-bold uppercase tracking-widest">
                <span>🎬 รายการคลิป (<span id="clipCount" class="text-[#FE2C55]">0</span>/16)</span>
            </div>
            <div class="grid grid-cols-4 gap-3" id="clipGrid"></div>
        </div>

        <div class="glass-card p-5 space-y-2">
            <h3 class="text-xs font-bold text-sky-400 uppercase italic border-l-2 border-sky-400 pl-2">📅 Monthly Missions</h3>
            <div id="monthlyList" class="space-y-2"></div>
        </div>

        <div class="glass-card p-5 space-y-2">
            <h3 class="text-xs font-bold text-[#FE2C55] uppercase italic border-l-2 border-[#FE2C55] pl-2">🕒 รายการรางวัลที่ต้องรอรับ</h3>
            <div id="updateList" class="space-y-2"></div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 p-4 flex justify-around items-center z-50 pb-6 rounded-t-3xl shadow-[0_-10px_20px_rgba(0,0,0,0.5)] bg-[#0a0a0a]">
        <a href="index.html" class="flex flex-col items-center gap-1 text-gray-500 font-bold uppercase text-[10px]">Tags</a>
        <a href="mission.html" class="flex flex-col items-center gap-1 nav-active font-bold uppercase text-[10px] pt-1">Mission</a>
        <a href="calc.html" class="flex flex-col items-center gap-1 text-gray-500 font-bold uppercase text-[10px]">Calc</a>
    </nav>

    <script>
        const clipData = [{v:6, vip:false},{v:6, vip:false},{v:8, vip:true},{v:8, vip:true},{v:8, vip:true},{v:8, vip:true},{v:8, vip:true},{v:10, vip:true},{v:10, vip:true},{v:10, vip:true},{v:12, vip:true},{v:12, vip:true},{v:12, vip:true},{v:12, vip:true},{v:8, vip:true},{v:8, vip:true}];
        const monthlyM = [{id:'m500', name:'สะสมครบ 500 วิว', pts:20},{id:'m5k', name:'สะสมครบ 5,000 วิว', pts:20},{id:'m30k', name:'สะสมครบ 30,000 วิว', pts:20},{id:'m30full', name:'ครบ 30 เควสย่อย', pts:60}];
        const updateM = [{id:'tiktok', name:'ผูกบัญชี TikTok', pts:10},{id:'first_m', name:'ทำภารกิจครั้งแรก', pts:10},{id:'v_first', name:'ลงวีดีโอครั้งแรก', pts:10},{id:'l100', name:'ยอดไลค์ 100 ไลค์', pts:15},{id:'v10k', name:'ยอดวิวสูงสุด 10,000 วิว', pts:20},{id:'c2', name:'ลงคลิปครบ 2 คลิป', pts:10},{id:'c5', name:'ลงคลิปครบ 5 คลิป', pts:10},{id:'c10', name:'ลงคลิปครบ 10 คลิป', pts:10},{id:'c15', name:'ลงคลิปครบ 15 คลิป', pts:10},{id:'vip1', name:'VIP (1 งาน)', pts:10},{id:'vip3', name:'VIP (3 งาน)', pts:10},{id:'vip7', name:'VIP (7 งาน)', pts:10},{id:'vip12', name:'VIP (12 งาน)', pts:10}];

        let selClips = new Set();
        let selMissions = new Set();
        let currentGoal = 0;

        function save() { localStorage.setItem('rov_ultra_v3', JSON.stringify({c: Array.from(selClips), m: Array.from(selMissions), g: currentGoal})); }
        function load() {
            const s = localStorage.getItem('rov_ultra_v3');
            if(s) {
                const d = JSON.parse(s);
                selClips = new Set(d.c); selMissions = new Set(d.m); currentGoal = d.g;
                document.getElementById('customInput').value = currentGoal || '';
                render();
            }
        }

        function setGoal(val) { document.getElementById('customInput').value = val; runUltraAI(); }

        function getBasePoints() {
            let pts = 0;
            selClips.forEach(idx => { pts += (idx === 0 ? 20 : 25); });
            monthlyM.forEach(m => { if(selMissions.has(m.id)) pts += m.pts; });
            return pts;
        }

        function getUpdatePoints() {
            let pts = 0;
            updateM.forEach(u => { if(selMissions.has(u.id)) pts += u.pts; });
            return pts;
        }

        function updatePoints() {
            const count = selClips.size;
            if(count * 4 >= 30) selMissions.add('m30full'); else selMissions.delete('m30full');
            if(count >= 2) selMissions.add('c2'); else selMissions.delete('c2');
            if(count >= 5) selMissions.add('c5'); else selMissions.delete('c5');
            if(count >= 10) selMissions.add('c10'); else selMissions.delete('c10');
            if(count >= 15) selMissions.add('c15'); else selMissions.delete('c15');
            
            let vC = 0, h10 = false, tv = 0;
            selClips.forEach(idx => { 
                if(clipData[idx].vip) vC++; 
                if(clipData[idx].v >= 10) h10 = true;
                tv += clipData[idx].v;
            });
            if(vC >= 1) selMissions.add('vip1'); else selMissions.delete('vip1');
            if(vC >= 3) selMissions.add('vip3'); else selMissions.delete('vip3');
            if(vC >= 7) selMissions.add('vip7'); else selMissions.delete('vip7');
            if(vC >= 12) selMissions.add('vip12'); else selMissions.delete('vip12');
            if(h10) selMissions.add('v10k'); else selMissions.delete('v10k');
            if(tv >= 0.5) selMissions.add('m500'); else selMissions.delete('m500');
            if(tv >= 5) selMissions.add('m5k'); else selMissions.delete('m5k');
            if(tv >= 30) selMissions.add('m30k'); else selMissions.delete('m30k');

            const total = getBasePoints() + getUpdatePoints();
            document.getElementById('totalPts').innerText = total.toLocaleString();
            document.getElementById('clipCount').innerText = count;
            calculateExchange(total);
            save();
        }

        function calculateExchange(pts) {
            let best = null;
            for (let c1=0; c1<=2; c1++) {
                for (let c2=0; c2<=3; c2++) {
                    for (let c3=0; c3<=4; c3++) {
                        if ((c1*500)+(c2*300)+(c3*100) === currentGoal) {
                            let cost = (c1*300)+(c2*180)+(c3*70);
                            if (!best || cost < best.cost) best = {c1, c2, c3, cost};
                        }
                    }
                }
            }
            const box = document.getElementById('exchangeSummary');
            if (best && currentGoal > 0) {
                box.classList.remove('hidden');
                let res = [];
                if (best.c1 > 0) res.push(`500x${best.c1}`);
                if (best.c2 > 0) res.push(`300x${best.c2}`);
                if (best.c3 > 0) res.push(`100x${best.c3}`);
                document.getElementById('exchangeList').innerText = "สูตรแลก: " + res.join(' + ');
                document.getElementById('usedPts').innerText = best.cost;
                const remain = pts - best.cost;
                document.getElementById('remainPts').innerText = remain.toLocaleString();
                document.getElementById('remainPts').className = remain < 0 ? "text-red-500 font-bold" : "text-sky-400 font-bold";
            } else box.classList.add('hidden');
        }

        function runUltraAI() {
            const val = parseInt(document.getElementById('customInput').value) || 0;
            if (val <= 0) return;
            fullReset(); currentGoal = val;
            let targetCost = 0;
            for(let c1=0; c1<=2; c1++) for(let c2=0; c2<=3; c2++) for(let c3=0; c3<=4; c3++) {
                if((c1*500)+(c2*300)+(c3*100) === currentGoal) {
                    let cost = (c1*300)+(c2*180)+(c3*70);
                    if(targetCost === 0 || cost < targetCost) targetCost = cost;
                }
            }
            if(targetCost === 0) return;
            selMissions.add('tiktok'); selMissions.add('first_m'); selMissions.add('v_first'); selMissions.add('l100');
            for(let i=0; i<clipData.length; i++) {
                if (getBasePoints() + getUpdatePoints() >= targetCost) break;
                selClips.add(i);
                updatePoints();
            }
            const finalTotal = getBasePoints() + getUpdatePoints();
            const advice = document.getElementById('aiAdvice');
            if (finalTotal >= targetCost) {
                advice.innerHTML = `AI แนะนำทำ <span class="text-white">${selClips.size} คลิป</span> เพื่อเป้าหมาย`;
                advice.className = "mt-4 p-3 rounded-xl bg-white/5 text-[#25F4EE] text-[11px] font-bold italic";
            } else {
                advice.innerHTML = `⚠️ ขาดอีก <span class="text-white">${targetCost - finalTotal} แต้ม</span> (ทำครบ 16 คลิปแล้ว)`;
                advice.className = "mt-4 p-3 rounded-xl bg-red-500/20 text-red-400 text-[11px] font-bold italic border border-red-500/30";
            }
            render();
        }

        function render() {
            const grid = document.getElementById('clipGrid'); grid.innerHTML = '';
            clipData.forEach((c, i) => {
                const btn = document.createElement('div');
                btn.className = `clip-btn h-12 flex flex-col items-center justify-center rounded-xl text-[10px] cursor-pointer ${selClips.has(i) ? 'selected' : 'bg-[#0a0a0a] text-gray-500'}`;
                btn.innerHTML = `<span>${i+1}</span><span class="text-[8px] opacity-60">${c.v}k</span>${c.vip ? '<span class="vip-badge">VIP</span>' : ''}`;
                btn.onclick = () => { selClips.has(i) ? selClips.delete(i) : selClips.add(i); updatePoints(); render(); };
                grid.appendChild(btn);
            });

            const mList = document.getElementById('monthlyList'); mList.innerHTML = '';
            monthlyM.forEach(m => {
                const div = document.createElement('div');
                div.className = `mission-item ${selMissions.has(m.id) ? 'active' : ''}`;
                div.innerHTML = `<span class="text-xs font-bold">${m.name} (+${m.pts})</span>`;
                div.onclick = () => { selMissions.has(m.id) ? selMissions.delete(m.id) : selMissions.add(m.id); updatePoints(); render(); };
                mList.appendChild(div);
            });

            const uList = document.getElementById('updateList'); uList.innerHTML = '';
            updateM.forEach(m => {
                const div = document.createElement('div');
                div.className = `mission-item ${selMissions.has(m.id) ? 'active' : ''}`;
                div.innerHTML = `<span class="text-xs font-bold">${m.name} (+${m.pts})</span>`;
                div.onclick = () => { selMissions.has(m.id) ? selMissions.delete(m.id) : selMissions.add(m.id); updatePoints(); render(); };
                uList.appendChild(div);
            });
            updatePoints();
        }

        function copyBaseOnly() {
            const basePts = getBasePoints();
            const t = `📊 แผนงานลงคลิป: ${selClips.size} คลิป\nแต้มพื้นฐานสะสม: ${basePts} แต้ม`;
            navigator.clipboard.writeText(t).then(() => {
                const btn = document.getElementById('btnBase');
                btn.innerText = "คัดลอกสำเร็จ ✅";
                setTimeout(() => { btn.innerText = "คัดลอกแผนงาน"; }, 1500);
            });
        }

        function copyUpdateOnly() {
            let adviceText = "";
            if (currentGoal === 1000) {
                adviceText = "💡 แนะนำให้กดแลก 500 และ 300 ก่อนนะครับ แล้วรอระบบรีช่วง 12-24 ชม. ค่อยกดแลกเพิ่ม 100 อีกสองรอบให้ครบเป้าหมาย";
            } else {
                adviceText = "💡 แนะนำให้กดแลก 500 จำนวน 2 รอบก่อนนะครับ แล้วรอระบบรีช่วง 12-24 ชม. ค่อยกลับมาแลกอีกครั้งนึง เพราะตอนนี้ภารกิจยังมาไม่ครบ ถ้าแลกแบบนี้เวลาภารกิจมาเพิ่มในอนาคตจะสามารถเก็บได้เพิ่มอีก 300-400 ปอง และใช้แต้มน้อยกว่าการแลกแพ็กเล็กครับ";
            }
            const t = `สรุปเป้าหมาย ${currentGoal} คูปอง ✨\n\n${adviceText}\n\nตรวจสอบข้อมูลเรียบร้อย ขอบคุณที่ใช้บริการ 🙏`;
            navigator.clipboard.writeText(t).then(() => {
                const btn = document.getElementById('btnUpdate');
                btn.innerText = "คัดลอกสำเร็จ ✅";
                setTimeout(() => { btn.innerText = "รางวัลรอรับ"; }, 1500);
            });
        }

        function fullReset() { selClips.clear(); selMissions.clear(); currentGoal = 0; document.getElementById('customInput').value = ''; localStorage.removeItem('rov_ultra_v3'); render(); }
        window.onload = load;
    </script>
</body>
</html>
